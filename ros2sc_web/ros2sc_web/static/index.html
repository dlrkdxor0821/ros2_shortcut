<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ROS2SC Web Inspector</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans,
          sans-serif;
        margin: 16px;
      }
      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .muted {
        opacity: 0.7;
        font-size: 0.9rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 12px;
        margin-top: 12px;
      }
      .tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      .tab {
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        background: transparent;
        cursor: pointer;
        user-select: none;
      }
      .tab[aria-selected="true"] {
        border-color: rgba(127, 127, 127, 0.8);
        font-weight: 600;
      }
      .card {
        border: 1px solid rgba(127, 127, 127, 0.35);
        border-radius: 10px;
        padding: 12px;
      }
      .card h2 {
        margin: 0 0 8px 0;
        font-size: 1rem;
      }
      input[type="search"] {
        width: 320px;
        max-width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(127, 127, 127, 0.35);
      }
      input[type="text"] {
        width: 180px;
        max-width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(127, 127, 127, 0.35);
      }
      button {
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        background: transparent;
        cursor: pointer;
      }
      button.small {
        padding: 4px 8px;
        border-radius: 8px;
        font-size: 0.85rem;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.9rem;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        font-size: 0.8rem;
        opacity: 0.85;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      td, th {
        text-align: left;
        padding: 6px 4px;
        border-bottom: 1px solid rgba(127, 127, 127, 0.2);
        vertical-align: top;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 0.9em;
      }
      .iface {
        margin-top: 10px;
        padding-top: 10px;
        border-top: 1px dashed rgba(127, 127, 127, 0.35);
      }
      .modalBackdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .modalBackdrop[aria-hidden="false"] {
        display: flex;
      }
      .modal {
        width: min(980px, 100%);
        max-height: min(78vh, 900px);
        overflow: auto;
        border-radius: 12px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        background: Canvas;
        color: CanvasText;
        padding: 12px;
      }
      .modalHeader {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        position: sticky;
        top: 0;
        background: Canvas;
        padding-bottom: 8px;
        margin-bottom: 8px;
        border-bottom: 1px solid rgba(127, 127, 127, 0.2);
      }
      .modalHeaderTitle {
        font-weight: 600;
      }
      .modalCmdRow {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        margin: 8px 0;
      }
      .cmdBox {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(127, 127, 127, 0.35);
        background: rgba(127, 127, 127, 0.08);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono",
          "Courier New", monospace;
        font-size: 0.9rem;
        overflow: auto;
        white-space: pre;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="row">
        <input id="domain" type="text" inputmode="numeric" placeholder="ROS_DOMAIN_ID (예: 0)" />
        <input id="filter" type="search" placeholder="필터 (예: /tf, camera, nav2)" />
        <button id="refresh">새로고침</button>
        <span id="status" class="pill">-</span>
      </div>
    </header>

    <div class="tabs" role="tablist" aria-label="Views">
      <div class="tab" role="tab" tabindex="0" aria-selected="true" data-tab="topics">Topics</div>
      <div class="tab" role="tab" tabindex="0" aria-selected="false" data-tab="services">Services</div>
      <div class="tab" role="tab" tabindex="0" aria-selected="false" data-tab="actions">Actions</div>
      <div class="tab" role="tab" tabindex="0" aria-selected="false" data-tab="nodes">Nodes</div>
      <div class="tab" role="tab" tabindex="0" aria-selected="false" data-tab="packages">Packages</div>
    </div>

    <div class="grid">
      <section class="card" id="panel">
        <h2 id="panelTitle">Topics</h2>
        <div class="muted" id="panelCount">-</div>
        <div id="panelBody"></div>
      </section>
    </div>

    <div id="modalBackdrop" class="modalBackdrop" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modalHeader">
          <div class="modalHeaderTitle" id="modalTitle">Interface</div>
          <button id="modalClose" class="small">닫기</button>
        </div>
        <div class="muted" id="modalMeta">-</div>
        <div class="modalCmdRow">
          <div class="muted">command template</div>
          <div class="row">
            <button id="copyCmd" class="small">명령어 복사</button>
            <button id="copyPayload" class="small">payload 복사</button>
          </div>
        </div>
        <div id="modalCmd" class="cmdBox"></div>
        <div class="modalCmdRow">
          <div class="muted">ros2 interface show</div>
          <button id="copyIface" class="small">복사</button>
        </div>
        <pre id="modalBody"></pre>
      </div>
    </div>

    <script>
      const el = (id) => document.getElementById(id);

      function escapeHtml(s) {
        return s.replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
      }

      function matchesFilter(text, filter) {
        if (!filter) return true;
        return text.toLowerCase().includes(filter.toLowerCase());
      }

      function renderTable(rows, columns) {
        const header = `<tr>${columns.map((c) => `<th>${escapeHtml(c.label)}</th>`).join("")}</tr>`;
        const body = rows
          .map((r) => {
            const tds = columns
              .map((c) => {
                const v = c.get(r);
                if (c.html) return `<td>${String(v ?? "")}</td>`;
                return `<td>${escapeHtml(String(v ?? ""))}</td>`;
              })
              .join("");
            return `<tr>${tds}</tr>`;
          })
          .join("");
        return `<table>${header}${body}</table>`;
      }

      function openModal(title, meta, body) {
        el("modalTitle").textContent = title;
        el("modalMeta").textContent = meta ?? "";
        el("modalBody").textContent = body ?? "";
        el("modalCmd").textContent = "";
        el("copyCmd").disabled = true;
        el("copyPayload").disabled = true;
        el("copyIface").disabled = false;
        el("modalBackdrop").setAttribute("aria-hidden", "false");
      }

      function closeModal() {
        el("modalBackdrop").setAttribute("aria-hidden", "true");
      }

      async function copyToClipboard(text) {
        try {
          await navigator.clipboard.writeText(text);
        } catch (_) {
          const ta = document.createElement("textarea");
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
        }
      }

      async function showInterface(kind, name, type) {
        try {
          el("status").textContent = "loading";
          const ifaceRes = await fetch(`/api/interface?type=${encodeURIComponent(type)}`, { cache: "no-store" });
          const tplRes = await fetch(
            `/api/template?kind=${encodeURIComponent(kind)}&name=${encodeURIComponent(
              name
            )}&type=${encodeURIComponent(type)}`,
            { cache: "no-store" }
          );
          const res = ifaceRes;
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await ifaceRes.json();
          const tpl = await tplRes.json();

          const title = data.ok ? `${kind}: ${name}` : `Invalid type`;
          const meta = data.ok ? `type: ${data.type}` : data.error;
          const text = data.ok ? data.text : data.error;
          openModal("Interface", `${title} | ${meta}`, text || "(empty)");

          const rawCmd = tpl?.ok ? tpl.command : "";
          const rawPayload = tpl?.ok ? tpl.payload : "";
          el("modalCmd").textContent = rawCmd;
          el("copyCmd").disabled = !(tpl?.ok && tpl.command);
          el("copyPayload").disabled = !(tpl?.ok && tpl.payload);

          el("copyCmd").onclick = () => copyToClipboard(rawCmd || "");
          el("copyPayload").onclick = () => copyToClipboard(rawPayload || "");
          el("copyIface").onclick = () =>
            copyToClipboard(`ros2 interface show ${type}\n\n${el("modalBody").textContent || ""}`);

          el("status").textContent = "ok";
        } catch (e) {
          el("status").textContent = "error";
        }
      }

      async function load() {
        el("status").textContent = "loading";
        try {
          const domainId = el("domain").value.trim();
          const qs = domainId !== "" ? `?domain_id=${encodeURIComponent(domainId)}` : "";
          const res = await fetch(`/api/snapshot${qs}`, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();

          const filter = el("filter").value.trim();

          const active = document.querySelector('.tab[aria-selected="true"]').dataset.tab;
          if (active === "topics") {
            const topics = (data.topics || [])
              .flatMap((t) => (t.types || []).map((ty) => ({ name: t.name, type: ty })))
              .filter((t) => matchesFilter(`${t.name} ${t.type}`, filter));
            el("panelTitle").textContent = "Topics";
            el("panelCount").textContent = `${topics.length} topics (domain_id=${data.domain_id ?? ""})`;
            el("panelBody").innerHTML = renderTable(topics, [
              {
                label: "name",
                get: (t) => `<code>${escapeHtml(t.name)}</code>`,
                html: true,
              },
              { label: "type", get: (t) => `<code>${escapeHtml(t.type)}</code>`, html: true },
              {
                label: "interface",
                get: (t) =>
                  `<button class="small ifaceBtn" data-kind="topic" data-name="${escapeHtml(
                    t.name
                  )}" data-type="${escapeHtml(t.type)}">보기</button>`,
                html: true,
              },
            ]);
          } else if (active === "services") {
            const services = (data.services || [])
              .flatMap((s) => (s.types || []).map((ty) => ({ name: s.name, type: ty })))
              .filter((s) => matchesFilter(`${s.name} ${s.type}`, filter));
            el("panelTitle").textContent = "Services";
            el("panelCount").textContent = `${services.length} services (domain_id=${data.domain_id ?? ""})`;
            el("panelBody").innerHTML = renderTable(services, [
              {
                label: "name",
                get: (s) => `<code>${escapeHtml(s.name)}</code>`,
                html: true,
              },
              { label: "type", get: (s) => `<code>${escapeHtml(s.type)}</code>`, html: true },
              {
                label: "interface",
                get: (s) =>
                  `<button class="small ifaceBtn" data-kind="service" data-name="${escapeHtml(
                    s.name
                  )}" data-type="${escapeHtml(s.type)}">보기</button>`,
                html: true,
              },
            ]);
          } else if (active === "actions") {
            const actions = (data.actions || [])
              .flatMap((a) => (a.types || []).map((ty) => ({ name: a.name, type: ty })))
              .filter((a) => matchesFilter(`${a.name} ${a.type}`, filter));
            el("panelTitle").textContent = "Actions";
            el("panelCount").textContent = `${actions.length} actions (domain_id=${data.domain_id ?? ""})`;
            el("panelBody").innerHTML = renderTable(actions, [
              {
                label: "name",
                get: (a) => `<code>${escapeHtml(a.name)}</code>`,
                html: true,
              },
              { label: "type", get: (a) => `<code>${escapeHtml(a.type)}</code>`, html: true },
              {
                label: "interface",
                get: (a) =>
                  `<button class="small ifaceBtn" data-kind="action" data-name="${escapeHtml(
                    a.name
                  )}" data-type="${escapeHtml(a.type)}">보기</button>`,
                html: true,
              },
            ]);
          } else if (active === "nodes") {
            const nodes = (data.nodes || []).filter((n) => matchesFilter(n, filter));
            el("panelTitle").textContent = "Nodes";
            el("panelCount").textContent = `${nodes.length} nodes (domain_id=${data.domain_id ?? ""})`;
            el("panelBody").innerHTML = `<pre>${escapeHtml(nodes.join("\n"))}</pre>`;
          } else if (active === "packages") {
            const packages = (data.packages || []).filter((p) => matchesFilter(p, filter));
            el("panelTitle").textContent = "Packages";
            el("panelCount").textContent = `${packages.length} packages`;
            el("panelBody").innerHTML = `<pre>${escapeHtml(packages.join("\n"))}</pre>`;
          }

          document.querySelectorAll("button.ifaceBtn").forEach((b) => {
            b.addEventListener("click", (e) => {
              e.preventDefault();
              const kind = b.dataset.kind || (active === "topics" ? "topic" : active === "services" ? "service" : "topic");
              const name = b.dataset.name || "";
              const type = b.dataset.type || "";
              showInterface(kind, name, type);
            });
          });

          el("status").textContent = "ok";
        } catch (e) {
          el("status").textContent = "error";
          el("panelTitle").textContent = "Error";
          el("panelCount").textContent = "-";
          el("panelBody").innerHTML = `<pre>${escapeHtml(String(e))}</pre>`;
        }
      }

      el("refresh").addEventListener("click", load);
      el("filter").addEventListener("input", () => {
        // simple debounce
        window.clearTimeout(window.__ros2sc_timer);
        window.__ros2sc_timer = window.setTimeout(load, 150);
      });

      el("domain").addEventListener("change", () => {
        localStorage.setItem("ros2sc_domain_id", el("domain").value.trim());
        load();
      });

      document.querySelectorAll(".tab").forEach((t) => {
        const activate = () => {
          document.querySelectorAll(".tab").forEach((x) => (x.ariaSelected = "false"));
          t.ariaSelected = "true";
          load();
        };
        t.addEventListener("click", activate);
        t.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") activate();
        });
      });

      el("domain").value = localStorage.getItem("ros2sc_domain_id") ?? "";
      load();

      el("modalClose").addEventListener("click", closeModal);
      el("modalBackdrop").addEventListener("click", (e) => {
        if (e.target === el("modalBackdrop")) closeModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });
    </script>
  </body>
</html>
